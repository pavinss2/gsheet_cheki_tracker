name: Daily Member Image Scraper

on:
  schedule:
    # Run daily at 02:00 UTC (09:00 Bangkok/Bangkok time)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual trigger of this workflow from the Actions tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          python update_member_images.py
