<script>
  // ==========================================
  // CONFIGURATION: HIDE COLUMNS FROM RAW TAB
  // ==========================================
  const HIDDEN_RAW_COLUMNS = ['Member Image'];

  let ALL_DATA = [];
  let HEADERS = [];
  let REORDERED_HEADERS = []; 
  let FILTERED_DATA = [];
  let ACTIVE_CELL_FILTERS = {}; 
  let EVENTS_VIEW_MODE = 'DAILY'; // Active View state tracking for the Events tab ('DAILY' or 'MONTHLY')

  const ALLOWED_GRID_FILTERS = new Set([
    'Member', 'Color', 'Group', 'Date', 'Month', 'Year', 'Type', 'Location', 'Nationality', 'Event', 'Company'
  ]);

  const COLOR_MAP = {
    'Green':  { primary: '#27ae60' },
    'Red':    { primary: '#e74c3c' },
    'Pink':   { primary: '#ff69b4' },
    'White':  { primary: '#ffffff' }, 
    'Blue':   { primary: '#3498db' },
    'Yellow': { primary: '#f1c40f' }, 
    'N/A':    { primary: '#7f8c8d' },
    'Purple': { primary: '#9b59b6' },
    'Orange': { primary: '#e67e22' },
    'Black':  { primary: '#555555' }
  };

  function getTextColorStyle(colorName) {
    let norm = String(colorName).trim();
    let match = COLOR_MAP[norm] || { primary: '#e0e0e0' };
    return 'color:' + match.primary + '; font-weight:700;';
  }

  function getMemberColorCode(memberName) {
    let foundRow = ALL_DATA.find(r => r['Member'] === memberName);
    if (foundRow && foundRow['Color']) {
      let match = COLOR_MAP[String(foundRow['Color']).trim()];
      if (match) return match.primary;
    }
    return '#8ab4f8';
  }

  let MEMBER_P_ARRAY = [];
  let GROUP_P_ARRAY = [];
  let COLOR_P_ARRAY = [];
  let EVENTS_P_ARRAY = []; // Events tab operational data array

  let TIMELINE_GRANULARITY = 'DAILY';
  let TIMELINE_BREAKDOWN = 'CONTEXT'; 
  let TIMELINE_CALC_MODE = 'CUMULATIVE';
  
  let PIVOT_MODES = { MEMBER: 'GRAPH', GROUP: 'GRAPH', COLOR: 'GRAPH' };
  let METRIC_SELECTIONS = { MEMBER: 'qty', GROUP: 'qty', COLOR: 'qty' };
  let HEATMAP_TOP_N = { MEMBER: 20, GROUP: 20, COLOR: 20 };

  let TOTAL_QTY_GLOBAL = 0;
  let TOTAL_PRICE_GLOBAL = 0;

  let RAW_SORT = { column: null, asc: true };
  let MEMBER_SORT = { column: 'qty', asc: false };
  let GROUP_SORT = { column: 'qty', asc: false };
  let COLOR_SORT = { column: 'qty', asc: false };
  let EVENTS_SORT = { column: 'Date', asc: false }; // Default chronological ordering
  
  let filterDebounceTimeout;

  google.charts.load('current', {'packages':['corechart', 'treemap']});
  google.charts.setOnLoadCallback(initializeDashboardEngine);

  let METADATA = {};
  let SELECTED_ROW_INDEX = null;
  let TRANSACTION_EDIT_MODE = false;

  function initializeDashboardEngine() {
    try {
      ALL_DATA = allDataJson;
      HEADERS = headersJson;
      METADATA = metadataJson;
      
      let middleHeaders = HEADERS.filter(h => h !== 'IMG' && h !== 'Talk Topic');
      REORDERED_HEADERS = [];
      if (HEADERS.includes('IMG')) REORDERED_HEADERS.push('IMG');
      REORDERED_HEADERS = REORDERED_HEADERS.concat(middleHeaders);
      if (HEADERS.includes('Talk Topic')) REORDERED_HEADERS.push('Talk Topic');

      // Clean out explicitly hidden raw columns from header rendering queue
      REORDERED_HEADERS = REORDERED_HEADERS.filter(h => !HIDDEN_RAW_COLUMNS.includes(h));

      FILTERED_DATA = [...ALL_DATA];
      
      populateFilterOptionsCascaded(true);

      const currentYearString = String(new Date().getFullYear());
      const yearSelectElement = document.getElementById('filter_year');
      if (yearSelectElement) {
        for (let i = 0; i < yearSelectElement.options.length; i++) {
          if (yearSelectElement.options[i].value === currentYearString) {
            yearSelectElement.value = currentYearString;
            break;
          }
        }
      }

      applyFilters(); 
    } catch (e) {
      document.getElementById('raw_table_container').innerHTML = "Variables Processing Error: Framework data structural arrays empty.";
    }
  }

  function populateFilterOptionsCascaded(isInitialSetup) {
    const selectedYear = document.getElementById('filter_year').value;
    const selectedMember = document.getElementById('filter_member').value;
    const selectedGroup = document.getElementById('filter_group').value;
    const selectedColor = document.getElementById('filter_color').value;
    const selectedNat = document.getElementById('filter_nationality').value;
    const selectedCmp = document.getElementById('filter_company').value;

    const years = new Set(), members = new Set(), groups = new Set(), colors = new Set(), nationalities = new Set(), companies = new Set();
    
    for(let i = 0; i < ALL_DATA.length; i++) {
      let row = ALL_DATA[i];
      
      let matchYear = !selectedYear || String(row['Year']) === String(selectedYear);
      let matchMember = !selectedMember || row['Member'] === selectedMember;
      let matchGroup = !selectedGroup || row['Group'] === selectedGroup;
      let matchColor = !selectedColor || row['Color'] === selectedColor;
      let matchNat = !selectedNat || row['Nationality'] === selectedNat;
      let matchCmp = !selectedCmp || row['Company'] === selectedCmp;

      if (matchMember && matchGroup && matchColor && matchNat && matchCmp) if(row['Year']) years.add(row['Year']);
      if (matchYear && matchGroup && matchColor && matchNat && matchCmp) if(row['Member']) members.add(row['Member']);
      if (matchYear && matchMember && matchColor && matchNat && matchCmp) if(row['Group']) groups.add(row['Group']);
      if (matchYear && matchMember && matchGroup && matchNat && matchCmp) if(row['Color']) colors.add(row['Color']);
      if (matchYear && matchMember && matchGroup && matchColor && matchCmp) if(row['Nationality']) nationalities.add(row['Nationality']);
      if (matchYear && matchMember && matchGroup && matchColor && matchNat) if(row['Company']) companies.add(row['Company']);
    }

    updateDropdownElement('filter_year', Array.from(years).sort(), selectedYear, "-- All Years --");
    updateDropdownElement('filter_member', Array.from(members).sort(), selectedMember, "-- All Members --");
    updateDropdownElement('filter_group', Array.from(groups).sort(), selectedGroup, "-- All Groups --");
    updateDropdownElement('filter_color', Array.from(colors).sort(), selectedColor, "-- All Colors --");
    updateDropdownElement('filter_nationality', Array.from(nationalities).sort(), selectedNat, "-- All Nationalities --");
    updateDropdownElement('filter_company', Array.from(companies).sort(), selectedCmp, "-- All Companies --");

    buildTimelineFilterCheckboxes();
  }

  function updateDropdownElement(id, items, selectedValue, defaultText) {
    const select = document.getElementById(id);
    if (!select) return;
    select.innerHTML = '<option value="">' + defaultText + '</option>';
    const frag = document.createDocumentFragment();
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item; opt.innerHTML = item;
      if (String(item) === String(selectedValue)) opt.selected = true;
      frag.appendChild(opt);
    });
    select.appendChild(frag);
  }

  function buildTimelineFilterCheckboxes() {
    const memBox = document.getElementById('timeline_member_checkboxes');
    const grpBox = document.getElementById('timeline_group_checkboxes');
    const colBox = document.getElementById('timeline_color_checkboxes');
    if (!memBox || !grpBox || !colBox) return;
    
    const currentSelectedMembers = getSelectedTimelineCheckboxes('timeline_member_checkboxes');
    const currentSelectedGroups = getSelectedTimelineCheckboxes('timeline_group_checkboxes');
    const currentSelectedColors = getSelectedTimelineCheckboxes('timeline_color_checkboxes');
    const isFirstRun = (currentSelectedMembers.size === 0 && currentSelectedGroups.size === 0 && currentSelectedColors.size === 0);

    const activeMembers = new Set();
    const activeGroups = new Set();
    const activeColors = new Set();

    FILTERED_DATA.forEach(row => {
      if (row['Member']) activeMembers.add(row['Member']);
      if (row['Group']) activeGroups.add(row['Group']);
      if (row['Color']) activeColors.add(row['Color']);
    });

    const sortedMembers = Array.from(activeMembers).sort();
    const sortedGroups = Array.from(activeGroups).sort();
    const sortedColors = Array.from(activeColors).sort();
    
    memBox.innerHTML = sortedMembers.map(m => {
      let isChecked = isFirstRun || currentSelectedMembers.has(m) ? 'checked' : '';
      return '<label class="checkbox-item"><input type="checkbox" value="' + m + '" ' + isChecked + ' onchange="drawTimelineChart()"> ' + m + '</label>';
    }).join('') || '<span style="font-size:12px; color:#666; padding:6px;">No members available</span>';

    grpBox.innerHTML = sortedGroups.map(g => {
      let isChecked = isFirstRun || currentSelectedGroups.has(g) ? 'checked' : '';
      return '<label class="checkbox-item"><input type="checkbox" value="' + g + '" ' + isChecked + ' onchange="drawTimelineChart()"> ' + g + '</label>';
    }).join('') || '<span style="font-size:12px; color:#666; padding:6px;">No groups available</span>';

    colBox.innerHTML = sortedColors.map(c => {
      let isChecked = isFirstRun || currentSelectedColors.has(c) ? 'checked' : '';
      return '<label class="checkbox-item"><input type="checkbox" value="' + c + '" ' + isChecked + ' onchange="drawTimelineChart()"> ' + c + '</label>';
    }).join('') || '<span style="font-size:12px; color:#666; padding:6px;">No colors available</span>';

    filterCheckboxesByText('timeline_member_search', 'timeline_member_checkboxes');
    filterCheckboxesByText('timeline_group_search', 'timeline_group_checkboxes');
    filterCheckboxesByText('timeline_color_search', 'timeline_color_checkboxes');
  }

  function filterCheckboxesByText(searchBoxId, checkboxContainerId) {
    const searchBox = document.getElementById(searchBoxId);
    const container = document.getElementById(checkboxContainerId);
    if (!searchBox || !container) return;
    const query = searchBox.value.toLowerCase().trim();
    const labels = container.getElementsByClassName('checkbox-item');
    for (let i = 0; i < labels.length; i++) {
      let textContent = labels[i].textContent || labels[i].innerText;
      labels[i].style.display = textContent.toLowerCase().includes(query) ? 'flex' : 'none';
    }
  }

  function toggleSubCheckboxes(containerId, checkAllState) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const labels = container.getElementsByClassName('checkbox-item');
    for (let i = 0; i < labels.length; i++) {
      if (labels[i].style.display !== 'none') {
        const input = labels[i].getElementsByTagName('input')[0];
        if (input) input.checked = checkAllState;
      }
    }
    drawTimelineChart();
  }

  function applyFilters() {
    clearTimeout(filterDebounceTimeout);
    filterDebounceTimeout = setTimeout(() => {
      window.requestAnimationFrame(runFilterPipelineCalculation);
    }, 40);
  }

  function runFilterPipelineCalculation() {
    resetSelection();
    const yr = document.getElementById('filter_year').value;
    const mem = document.getElementById('filter_member').value;
    const grp = document.getElementById('filter_group').value;
    const colFilter = document.getElementById('filter_color').value;
    const nat = document.getElementById('filter_nationality').value;
    const cmp = document.getElementById('filter_company').value;

    const hasCellFilters = Object.keys(ACTIVE_CELL_FILTERS).length > 0;

    FILTERED_DATA = ALL_DATA.filter(row => {
      if (yr && String(row['Year']) !== String(yr)) return false;
      if (mem && row['Member'] !== mem) return false;
      if (grp && row['Group'] !== grp) return false;
      if (colFilter && row['Color'] !== colFilter) return false;
      if (nat && row['Nationality'] !== nat) return false;
      if (cmp && row['Company'] !== cmp) return false;
      if (hasCellFilters) {
        for (let colKey in ACTIVE_CELL_FILTERS) {
          if (String(row[colKey]) !== String(ACTIVE_CELL_FILTERS[colKey])) return false;
        }
      }
      return true;
    });

    populateFilterOptionsCascaded(false);
    renderTokenBreadcrumbs();
    calculateGlobalKPIs();
    buildPivotDatasets();
    
    sortRawDataStructure();
    sortEventsDataStructure();
    renderAllViews();
    hideLoading();
  }

  function filterByCell(columnName, value) {
    if (!ALLOWED_GRID_FILTERS.has(columnName)) return;
    ACTIVE_CELL_FILTERS[columnName] = value;
    
    let elementMap = { 
      'Year': 'filter_year', 'Member': 'filter_member', 'Group': 'filter_group', 
      'Color': 'filter_color', 'Nationality': 'filter_nationality', 'Company': 'filter_company' 
    };
    if (elementMap[columnName]) {
      let uiEl = document.getElementById(elementMap[columnName]);
      if (uiEl) uiEl.value = value;
    }
    applyFilters();
  }

  function removeCellFilterToken(columnName) {
    delete ACTIVE_CELL_FILTERS[columnName];
    let elementMap = { 
      'Year': 'filter_year', 'Member': 'filter_member', 'Group': 'filter_group', 
      'Color': 'filter_color', 'Nationality': 'filter_nationality', 'Company': 'filter_company' 
    };
    if (elementMap[columnName]) {
      let uiEl = document.getElementById(elementMap[columnName]);
      if (uiEl) uiEl.value = "";
    }
    applyFilters();
  }

  function renderTokenBreadcrumbs() {
    const statusDiv = document.getElementById('cell_filter_status');
    const container = document.getElementById('token_container');
    let filterKeys = Object.keys(ACTIVE_CELL_FILTERS);
    if (filterKeys.length === 0) {
      statusDiv.style.display = 'none';
      return;
    }
    container.innerHTML = filterKeys.map(k => {
      return '<span class="filter-token">' + k + ': "' + ACTIVE_CELL_FILTERS[k] + '" <button class="clear-token-btn" onclick="removeCellFilterToken(\'' + k + '\')">×</button></span>';
    }).join('');
    statusDiv.style.display = 'flex';
  }

  function createTop3ListHTML(frequencyMap, globalTotal, isMemberCard = false) {
    let sortedItems = Object.keys(frequencyMap).map(key => {
      return { name: key, value: frequencyMap[key] };
    }).sort((a, b) => b.value - a.value);

    if (sortedItems.length === 0) return "No records found";
    let top3 = sortedItems.slice(0, 3);
    let html = "<ol>";
    top3.forEach(item => {
      let pct = globalTotal > 0 ? ((item.value / globalTotal) * 100).toFixed(1) : '0.0';
      let displayVal = item.value.toLocaleString();
      let inlineColorStyle = isMemberCard ? `style="color: ${getMemberColorCode(item.name)}; font-weight: bold;"` : "";
      html += `<li><strong ${inlineColorStyle}>${item.name}</strong>: ${displayVal} (${pct}%)</li>`;
    });
    return html + "</ol>";
  }

  function calculateGlobalKPIs() {
    TOTAL_QTY_GLOBAL = 0; TOTAL_PRICE_GLOBAL = 0;
    let memberMap = {}, groupMap = {}, typeMap = {}, locationMap = {};

    for (let i = 0; i < FILTERED_DATA.length; i++) {
      let row = FILTERED_DATA[i];
      let q = Number(row['Quantity']) || Number(row['Qty']) || 0;
      let p = Number(row['Total Price (THB)']) || 0;
      let m = row['Member'] || 'Unknown';
      let g = row['Group'] || 'Unknown';
      let t = row['Type'] || 'Unknown';
      let l = row['Location'] || 'Unknown';

      TOTAL_QTY_GLOBAL += q; TOTAL_PRICE_GLOBAL += p;
      if (row['Member']) memberMap[m] = (memberMap[m] || 0) + q;
      if (row['Group']) groupMap[g] = (groupMap[g] || 0) + q;
      if (row['Type']) typeMap[t] = (typeMap[t] || 0) + q;
      if (row['Location']) locationMap[l] = (locationMap[l] || 0) + q;
    }

    document.getElementById('kpi_total_qty').innerText = TOTAL_QTY_GLOBAL.toLocaleString();
    document.getElementById('kpi_total_qty_subtext').innerText = '฿ ' + TOTAL_PRICE_GLOBAL.toLocaleString();
    document.getElementById('kpi_unique_members').innerText = Object.keys(memberMap).filter(k => k !== 'Unknown').length.toLocaleString();
    document.getElementById('kpi_unique_groups').innerText = Object.keys(groupMap).filter(k => k !== 'Unknown').length.toLocaleString();
    document.getElementById('kpi_top_members').innerHTML = createTop3ListHTML(memberMap, TOTAL_QTY_GLOBAL, true);
    document.getElementById('kpi_top_groups').innerHTML = createTop3ListHTML(groupMap, TOTAL_QTY_GLOBAL, false);
    document.getElementById('kpi_top_types').innerHTML = createTop3ListHTML(typeMap, TOTAL_QTY_GLOBAL, false);
    document.getElementById('kpi_top_locations').innerHTML = createTop3ListHTML(locationMap, TOTAL_QTY_GLOBAL, false);
  }

  function renderAllViews() {
    renderRawTable();
    renderEventsPivotTable();
    renderMetadataTables();

    ['MEMBER', 'GROUP', 'COLOR'].forEach(vk => {
      let lower = vk.toLowerCase();
      let mode = PIVOT_MODES[vk];
      
      document.getElementById(lower + '_table_wrapper').style.display = (mode === 'TABLE') ? 'block' : 'none';
      document.getElementById(lower + '_heatmap_wrapper').style.display = (mode === 'HEATMAP') ? 'block' : 'none';
      document.getElementById(lower + '_graph_wrapper').style.display = (mode === 'GRAPH') ? 'block' : 'none';
      document.getElementById(lower + '_timeline_wrapper').style.display = (mode === 'TIMELINE') ? 'block' : 'none';
      
      if (mode === 'TABLE') {
        if (vk === 'MEMBER') renderMemberPivotHTML();
        else if (vk === 'GROUP') renderGroupPivotHTML();
        else renderColorPivotHTML();
      } else if (mode === 'HEATMAP') {
        drawHeatmapWidget(vk);
      } else if (mode === 'GRAPH') {
        drawDimensionBarGraph(vk);
      } else if (mode === 'TIMELINE') {
        drawTimelineChart();
      }
    });
    handleTimelineControlsVisibility();
  }

  function handleTimelineControlsVisibility() {
    let sharedControls = document.getElementById('shared_timeline_controls_wrapper');
    let activeTab = document.querySelector('.tab-content.active');
    let isTimelineActive = false;
    let labelBtn = document.getElementById('timeline_breakdown_context');
    
    if (activeTab) {
      if (activeTab.id === 'member_view_tab' && PIVOT_MODES.MEMBER === 'TIMELINE') {
        isTimelineActive = true;
        if(labelBtn) labelBtn.innerText = "By Member";
        document.getElementById('subfilter_box_member').style.display = 'flex';
        document.getElementById('subfilter_box_group').style.display = 'none';
        document.getElementById('subfilter_box_color').style.display = 'none';
      } else if (activeTab.id === 'group_view_tab' && PIVOT_MODES.GROUP === 'TIMELINE') {
        isTimelineActive = true;
        if(labelBtn) labelBtn.innerText = "By Group";
        document.getElementById('subfilter_box_member').style.display = 'none';
        document.getElementById('subfilter_box_group').style.display = 'flex';
        document.getElementById('subfilter_box_color').style.display = 'none';
      } else if (activeTab.id === 'color_view_tab' && PIVOT_MODES.COLOR === 'TIMELINE') {
        isTimelineActive = true;
        if(labelBtn) labelBtn.innerText = "By Color";
        document.getElementById('subfilter_box_member').style.display = 'none';
        document.getElementById('subfilter_box_group').style.display = 'none';
        document.getElementById('subfilter_box_color').style.display = 'flex';
      }
    }
    
    if (isTimelineActive && activeTab) {
      sharedControls.style.display = 'block';
      activeTab.appendChild(sharedControls);
    } else {
      sharedControls.style.display = 'none';
    }
  }

  function handleRawSort(columnName) {
    if (RAW_SORT.column === columnName) { RAW_SORT.asc = !RAW_SORT.asc; } 
    else { RAW_SORT.column = columnName; RAW_SORT.asc = true; }
    sortRawDataStructure();
    renderAllViews();
  }

  function sortRawDataStructure() {
    if (!RAW_SORT.column) return;
    const col = RAW_SORT.column; const isAsc = RAW_SORT.asc;
    FILTERED_DATA.sort((a, b) => {
      let valA = a[col] !== undefined ? a[col] : '';
      let valB = b[col] !== undefined ? b[col] : '';
      if (valA !== '' && valB !== '' && !isNaN(valA) && !isNaN(valB)) return isAsc ? Number(valA) - Number(valB) : Number(valB) - Number(valA);
      return isAsc ? String(valA).toLowerCase().localeCompare(String(valB).toLowerCase()) : String(valB).toLowerCase().localeCompare(String(valA).toLowerCase());
    });
  }

  function renderRawTable() {
    const container = document.getElementById('raw_table_container');
    const totalRecords = FILTERED_DATA.length;
    if(totalRecords === 0) { container.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No matching records found.</div>"; return; }

    let htmlBuffer = ["<table><thead><tr>"];
    if (TRANSACTION_EDIT_MODE) {
      htmlBuffer.push("<th>Edit</th>");
    }
    REORDERED_HEADERS.forEach(h => {
      let sortClass = RAW_SORT.column === h ? (RAW_SORT.asc ? 'class="sort-asc"' : 'class="sort-desc"') : '';
      htmlBuffer.push('<th ' + sortClass + ' onclick="handleRawSort(\'' + h + '\')">' + h + '</th>');
    });
    htmlBuffer.push("</tr></thead><tbody>");

    const renderLimit = Math.min(totalRecords, 200);
    for (let i = 0; i < renderLimit; i++) {
      let row = FILTERED_DATA[i];
      let rowSelectedClass = SELECTED_ROW_INDEX === i ? 'class="selected-row"' : '';
      htmlBuffer.push('<tr ' + rowSelectedClass + ' onclick="selectRow(event, ' + i + ')" ondblclick="openEditModal(null, ' + i + ')">');
      if (TRANSACTION_EDIT_MODE) {
        htmlBuffer.push('<td><button class="edit-row-btn" onclick="openEditModal(event, ' + i + ')">Edit</button></td>');
      }
      REORDERED_HEADERS.forEach(h => {
        let val = row[h] !== undefined ? row[h] : '';
        
        // Determine custom styling parameters for Member and Color row metrics
        let inlineStyle = '';
        if (h === 'Member') {
          inlineStyle = 'style="' + getTextColorStyle(row['Color']) + '"';
        } else if (h === 'Color') {
          inlineStyle = 'style="' + getTextColorStyle(val) + '"';
        }

        if (h === 'IMG' && val && (String(val).startsWith('http://') || String(val).startsWith('https://'))) {
          htmlBuffer.push('<td><a class="image-link" href="' + val + '" target="_blank">[ <span style="font-size: 16px; font-weight: bold; display: inline-block; vertical-align: middle; line-height: 1;">⌕</span> ]</a></td>');
        } else if (h === 'IMG') {
          htmlBuffer.push('<td>' + val + '</td>');
        } else if (ALLOWED_GRID_FILTERS.has(h)) {
          let safeVal = String(val).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
          htmlBuffer.push('<td ' + inlineStyle + ' class="raw-clickable-cell" onclick="filterByCell(\'' + h + '\', \'' + safeVal + '\')">' + val + '</td>');
        } else {
          htmlBuffer.push('<td ' + inlineStyle + '>' + val + '</td>');
        }
      });
      htmlBuffer.push("</tr>");
    }
    htmlBuffer.push("</tbody></table>");
    if (totalRecords > 200) htmlBuffer.push('<div class="pagination-alert">Performance Notice: Rendering first 200 of ' + totalRecords.toLocaleString() + ' active matches. Aggregate metrics and tab pivots calculations still include 100% of rows.</div>');
    container.innerHTML = htmlBuffer.join('');
  }

  function buildPivotDatasets() {
    let memberMap = {}, groupMap = {}, colorMap = {}, eventsMap = {};
    for (let i = 0; i < FILTERED_DATA.length; i++) {
      let row = FILTERED_DATA[i];
      let m = row['Member'] || 'Unknown'; let g = row['Group'] || 'Unknown'; let c = row['Color'] || 'Unknown';
      let ev = row['Event'] || 'Unknown'; let dt = row['Date'] || 'Unknown';
      let q = Number(row['Quantity']) || Number(row['Qty']) || 0; let p = Number(row['Total Price (THB)']) || 0;

      let mKey = m + "||" + g; 
      if (!memberMap[mKey]) { memberMap[mKey] = { Member: m, Group: g, Color: c, qty: 0, price: 0 }; }
      memberMap[mKey].qty += q; memberMap[mKey].price += p;
      
      if (!groupMap[g]) { groupMap[g] = { Group: g, qty: 0, price: 0 }; }
      groupMap[g].qty += q; groupMap[g].price += p;
      
      if (!colorMap[c]) { colorMap[c] = { Color: c, qty: 0, price: 0 }; }
      colorMap[c].qty += q; colorMap[c].price += p;

      // Group fields explicitly bound to uniquely combined Date + Event pathways
      let eKey = dt + "||" + ev;
      if (!eventsMap[eKey]) { eventsMap[eKey] = { Date: dt, Event: ev, qty: 0, price: 0 }; }
      eventsMap[eKey].qty += q; eventsMap[eKey].price += p;
    }
    MEMBER_P_ARRAY = Object.values(memberMap); 
    GROUP_P_ARRAY = Object.values(groupMap); 
    COLOR_P_ARRAY = Object.values(colorMap);
    EVENTS_P_ARRAY = Object.values(eventsMap);
    
    MEMBER_P_ARRAY.sort((a, b) => b.qty - a.qty); 
    GROUP_P_ARRAY.sort((a, b) => b.qty - a.qty); 
    COLOR_P_ARRAY.sort((a, b) => b.qty - a.qty);
    
    sortPivotDataStructure('MEMBER');
    sortPivotDataStructure('GROUP');
    sortPivotDataStructure('COLOR');
    sortEventsDataStructure();
  }

  function handlePivotSortClick(type, metricKey) {
    let sortObj = type === 'MEMBER' ? MEMBER_SORT : (type === 'GROUP' ? GROUP_SORT : COLOR_SORT);
    if (sortObj.column === metricKey) { sortObj.asc = !sortObj.asc; } else { sortObj.column = metricKey; sortObj.asc = true; }
    sortPivotDataStructure(type);
    if (type === 'MEMBER') renderMemberPivotHTML(); else if (type === 'GROUP') renderGroupPivotHTML(); else renderColorPivotHTML();
  }

  function sortPivotDataStructure(type) {
    let sortObj = type === 'MEMBER' ? MEMBER_SORT : (type === 'GROUP' ? GROUP_SORT : COLOR_SORT);
    let targetArray = type === 'MEMBER' ? MEMBER_P_ARRAY : (type === 'GROUP' ? GROUP_P_ARRAY : COLOR_P_ARRAY);
    if (!sortObj.column) return;
    const col = sortObj.column; const isAsc = sortObj.asc;

    targetArray.sort((a, b) => {
      let valA = col === 'qty_pct' ? (TOTAL_QTY_GLOBAL > 0 ? a.qty / TOTAL_QTY_GLOBAL : 0) : a[col];
      let valB = col === 'qty_pct' ? (TOTAL_QTY_GLOBAL > 0 ? b.qty / TOTAL_QTY_GLOBAL : 0) : b[col];
      if (typeof valA === 'number' && typeof valB === 'number') return isAsc ? valA - valB : valB - valA;
      return isAsc ? String(valA).toLowerCase().localeCompare(String(valB).toLowerCase()) : String(valB).toLowerCase().localeCompare(String(valA).toLowerCase());
    });
  }

  function handleEventsSortClick(metricKey) {
    if (EVENTS_SORT.column === metricKey) { EVENTS_SORT.asc = !EVENTS_SORT.asc; } 
    else { EVENTS_SORT.column = metricKey; EVENTS_SORT.asc = true; }

    });
  }

  function renderEventsPivotTable() {
    const container = document.getElementById('events_table_container');
    if (!container) return;
    if (EVENTS_P_ARRAY.length === 0) { 
      container.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No event metrics match parameters.</div>"; 
      return; 
    }
    
    // Separate or group dynamically based on Daily vs. Monthly active selection switches
    let processingMap = {};
    
    FILTERED_DATA.forEach(row => {
      let ev = row['Event'] || 'Unknown';
      let q = Number(row['Quantity']) || Number(row['Qty']) || 0;
      let p = Number(row['Total Price (THB)']) || 0;
      
      // 1. Switch key assignment based on operational granularity rule
      let timeKey = (EVENTS_VIEW_MODE === 'MONTHLY') ? (row['Month'] || 'Unknown') : (row['Date'] || 'Unknown');
      let uniqueGroupKey = timeKey + "||" + ev;
      
      if (!processingMap[uniqueGroupKey]) {
        processingMap[uniqueGroupKey] = { TimeKey: timeKey, Event: ev, qty: 0, price: 0 };
      }
      processingMap[uniqueGroupKey].qty += q;
      processingMap[uniqueGroupKey].price += p;
    });
    
    let localEventsArray = Object.values(processingMap);
    
    // Dynamic sorting application logic using your existing handler parameters
    const col = EVENTS_SORT.column || 'TimeKey';
    
    // FIX: Defaults to false (descending) on first load if EVENTS_SORT.asc is undefined
    const isAsc = EVENTS_SORT.asc !== undefined ? EVENTS_SORT.asc : false;
    
    localEventsArray.sort((a, b) => {
      let valA = col === 'Date' || col === 'Month' ? a.TimeKey : (col === 'qty_pct' ? a.qty : a[col]);
      let valB = col === 'Date' || col === 'Month' ? b.TimeKey : (col === 'qty_pct' ? b.qty : b[col]);
      if (typeof valA === 'number' && typeof valB === 'number') return isAsc ? valA - valB : valB - valA;
      return isAsc ? String(valA).toLowerCase().localeCompare(String(valB).toLowerCase()) : String(valB).toLowerCase().localeCompare(String(valA).toLowerCase());
    });

    // FIX: Ensures the table header UI arrow/class matches the actual state on first load
    const currentSortColumn = EVENTS_SORT.column || ((EVENTS_VIEW_MODE === 'MONTHLY') ? 'Month' : 'Date');
    const getCls = (metric) => currentSortColumn === metric ? (isAsc ? 'class="sort-asc"' : 'class="sort-desc"') : '';

    let previousRenderedTimeKey = null;
    let isGroupOddRowColorMode = true; // Flips between true/false when timeKey matches shift
    
    localEventsArray.forEach(row => {
      let displayTimeValue = "";
      
      if (row.TimeKey !== previousRenderedTimeKey) {
        displayTimeValue = row.TimeKey;
        previousRenderedTimeKey = row.TimeKey;
        // Toggle alternating background shade state every time a new date/month block is crossed
        isGroupOddRowColorMode = !isGroupOddRowColorMode;
      }
      
      // Apply inline styles to groups based on chronological changes
      let rowBackgroundStyle = isGroupOddRowColorMode ? 'style="background-color: #242424;"' : 'style="background-color: #1a1a1a;"';
      
      // 2. Structural Fix: The "raw-clickable-cell" and onclick grid filters have been completely dropped from the Event Name row cell layout matrix.

    });
    
    buf.push('<tr style="background:#1a365d; font-weight:bold; color:#ffffff;"><td>TOTAL</td><td>-</td><td>' + TOTAL_QTY_GLOBAL.toLocaleString() + '</td><td>100.0%</td><td>' + TOTAL_PRICE_GLOBAL.toLocaleString(undefined, {minimumFractionDigits:2}) + '</td></tr></tbody></table>');

  function drawDimensionBarGraph(viewKey) {
    let containerId = viewKey.toLowerCase() + '_chart_div';
    let element = document.getElementById(containerId);
    if (!element) return;

    let metricKey = METRIC_SELECTIONS[viewKey];
    let dataList = viewKey === 'MEMBER' ? [...MEMBER_P_ARRAY] : (viewKey === 'GROUP' ? [...GROUP_P_ARRAY] : [...COLOR_P_ARRAY]);

    if (dataList.length === 0) { 
      element.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No structural matching database records found.</div>"; 
      return; 
    }

    function getTrophySvg(rank) {
      let color = "";
      if (rank === 1) color = "#ffd700";
      else if (rank === 2) color = "#c0c0c0";
      else if (rank === 3) color = "#cd7f32";
      else return "";
      
      return `<svg viewBox="0 0 24 24" width="20" height="20" fill="${color}" style="display:inline-block; vertical-align:middle;">
        <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v3c0 2.44 1.72 4.48 4 4.9V19H5v2h14v-2h-2v-4.1c2.28-.42 4-2.46 4-4.9V7c0-1.1-.9-2-2-2zM5 10V7h2v3H5zm14 0h-2V7h2v3z"/>
      </svg>`;
    }

    if (viewKey === 'MEMBER') {
      // Aggregate by Member name (Request 3)
      let memberGroupMap = {};
      dataList.forEach(r => {
        let name = r.Member;
        if (!memberGroupMap[name]) {
          memberGroupMap[name] = { Member: name, qty: 0, price: 0 };
        }
        memberGroupMap[name].qty += r.qty;
        memberGroupMap[name].price += r.price;
      });
      dataList = Object.values(memberGroupMap);
    }
    
    dataList.sort((a, b) => b[metricKey] - a[metricKey]);
    let maxVal = Math.max(...dataList.map(item => item[metricKey])) || 1;
    let minVal = Math.min(...dataList.map(item => item[metricKey])) || 0;
    
    let gridTemplate = viewKey === 'MEMBER' ? 
      "minmax(30px, max-content) minmax(25px, max-content) minmax(40px, max-content) minmax(50px, max-content) 1fr" :
      "minmax(30px, max-content) minmax(25px, max-content) minmax(50px, max-content) 1fr";
    
    let html = `<div class="custom-member-bar-chart" style="grid-template-columns: ${gridTemplate};">`;
    
    dataList.forEach((r, idx) => {
      let rank = idx + 1;
      let rawVal = r[metricKey];
      let nameVal = viewKey === 'MEMBER' ? r.Member : (viewKey === 'GROUP' ? r.Group : r.Color);
      
      let barColor = '#4285f4';
      if (viewKey === 'MEMBER') {
        let memberMeta = METADATA && METADATA.members ? METADATA.members.find(m => m.member_name === nameVal && (m.is_active === 'TRUE' || m.is_active === true)) : null;
        if (!memberMeta && METADATA && METADATA.members) {
          memberMeta = METADATA.members.find(m => m.member_name === nameVal);
        }
        if (memberMeta && memberMeta.color) {
          let match = COLOR_MAP[String(memberMeta.color).trim()];
          if (match) barColor = match.primary;
        } else {
          barColor = getMemberColorCode(nameVal) || '#4285f4';
        }
      } else if (viewKey === 'COLOR') {
        barColor = (COLOR_MAP[String(nameVal).trim()] || {primary: '#4285f4'}).primary;
      } else if (viewKey === 'GROUP') {
        let ratio = 1 - (maxVal === minVal ? 1 : (rawVal - minVal) / (maxVal - minVal));
        barColor = 'rgb(' + Math.round(26 + 112 * ratio) + ',' + Math.round(54 + 126 * ratio) + ',' + Math.round(93 + 155 * ratio) + ')';
      }
      
      let labelName = nameVal;
      if (viewKey === 'MEMBER') {
        labelName = nameVal.replace(/\s*\(.*?\)\s*/g, '').trim();
      }
      
      let printableValue = metricKey === 'qty' ? rawVal.toLocaleString() : rawVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      if (metricKey === 'price') printableValue += '<span class="chart-unit"> THB</span>';
      
      let widthPct = maxVal > 0 ? ((rawVal / maxVal) * 100) : 0;
      
      // Trophy SVG
      let trophyHtml = '';
      if (rank === 1) trophyHtml = getTrophySvg(1);
      else if (rank === 2) trophyHtml = getTrophySvg(2);
      else if (rank === 3) trophyHtml = getTrophySvg(3);
      
      // Avatar wrapper for Member only
      let avatarWrapperHtml = '';
      if (viewKey === 'MEMBER') {
        let memberMeta = METADATA && METADATA.members ? METADATA.members.find(m => m.member_name === nameVal && (m.is_active === 'TRUE' || m.is_active === true)) : null;
        if (!memberMeta && METADATA && METADATA.members) {
          memberMeta = METADATA.members.find(m => m.member_name === nameVal);
        }
        let imgUrl = (memberMeta && memberMeta.member_image && memberMeta.member_image !== 'None') ? memberMeta.member_image : '';
        
        let borderColor = 'rgba(255,255,255,0.4)';
        let borderWidth = '1px';
        if (rank === 1) { borderColor = '#ffd700'; borderWidth = '2px'; }
        else if (rank === 2) { borderColor = '#c0c0c0'; borderWidth = '2px'; }
        else if (rank === 3) { borderColor = '#cd7f32'; borderWidth = '2px'; }
        
        let avatarHtml = '';
        if (imgUrl) {
          avatarHtml = `<img src="${imgUrl}" class="chart-member-avatar" style="border: ${borderWidth} solid ${borderColor};" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />`;
        }
        
        let initial = labelName ? labelName.charAt(0).toUpperCase() : '?';
        let fallbackBg = (memberMeta && memberMeta.color) ? memberMeta.color : '#444444';
        let fallbackHtml = `<div class="chart-member-avatar-placeholder" style="border: ${borderWidth} solid ${borderColor}; background-color: ${fallbackBg}; display: ${imgUrl ? 'none' : 'flex'};">${initial}</div>`;
        
        avatarWrapperHtml = `<div class="chart-avatar-wrapper">${avatarHtml}${fallbackHtml}</div>`;
      }
      
      html += `
        <div class="chart-rank">#${rank}</div>
        <div class="chart-trophy">${trophyHtml}</div>
        ${avatarWrapperHtml}
        <div class="chart-name">${labelName}</div>
        <div class="chart-bar-container">
          <div class="chart-bar-outer">
            <div class="chart-bar-inner" style="width: 0%; background-color: ${barColor};" data-width="${widthPct}"></div>
          </div>
          <span class="chart-bar-value">${printableValue}</span>
        </div>
      `;
    });
    html += '</div>';
    element.innerHTML = html;
    element.style.height = "auto";
    
    // Trigger animations
    setTimeout(() => {
      let bars = element.querySelectorAll('.chart-bar-inner');
      bars.forEach(bar => {
        bar.style.width = bar.getAttribute('data-width') + '%';
      });
    }, 50);
  }

  function drawHeatmapWidget(viewKey) {
    let containerId = viewKey.toLowerCase() + '_heatmap_container';
    let element = document.getElementById(containerId);
    if (!element) return;

    let metricKey = METRIC_SELECTIONS[viewKey];
    let dataList = viewKey === 'MEMBER' ? [...MEMBER_P_ARRAY] : (viewKey === 'GROUP' ? [...GROUP_P_ARRAY] : [...COLOR_P_ARRAY]);
    let dimField = viewKey === 'MEMBER' ? 'Member' : (viewKey === 'GROUP' ? 'Group' : 'Color');

    dataList.sort((a, b) => b[metricKey] - a[metricKey]);
    
    let limitBound = HEATMAP_TOP_N[viewKey] || 20;
    let topSelection = dataList.slice(0, limitBound);

    if (topSelection.length === 0) { element.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No operational metrics matching thresholds.</div>"; return; }

    let chartData = [[dimField + ' Element', 'Parent Core', 'Size Metric', 'Color Rule Identifier']];
    let parentNodeName = viewKey + 's Core';
    chartData.push([parentNodeName, null, 0, 0]);
    topSelection.forEach((r, idx) => { chartData.push([r[dimField], parentNodeName, r[metricKey], idx + 1]); });

    let dataTable = google.visualization.arrayToDataTable(chartData);
    let treeMapChart = new google.visualization.TreeMap(element);

    let rankOneValue = topSelection[0][metricKey] || 1;
    let globalBaseTotal = metricKey === 'qty' ? TOTAL_QTY_GLOBAL : TOTAL_PRICE_GLOBAL;

    let options = {
      minColor: '#1a365d', midColor: '#2b6cb0', maxColor: '#3182ce',
      headerHeight: 0, fontColor: 'transparent', fontSize: 1,
      showScale: false, useWeightedAverageForColor: false, maxPostDepth: 0, hintOpacity: 0
    };

    google.visualization.events.addListener(treeMapChart, 'ready', function() {
      let rects = element.getElementsByTagName('rect');
      let textElements = element.getElementsByTagName('text');
      for (let t = 0; t < textElements.length; t++) textElements[t].style.display = 'none';

      topSelection.forEach((item, idx) => {
        let rankNum = idx + 1;
        let rawLabel = item[dimField];
        let matchedHex = '#3182ce';
        
        if (viewKey === 'MEMBER' || viewKey === 'COLOR') {
          matchedHex = (COLOR_MAP[viewKey === 'MEMBER' ? item.Color : item[dimField]] || {primary: '#3182ce'}).primary;
        } else {
          let maxVal = Math.max(...topSelection.map(i => i[metricKey])) || 1;
          let minVal = Math.min(...topSelection.map(i => i[metricKey])) || 0;
          let ratio = 1 - (maxVal === minVal ? 1 : (item[metricKey] - minVal) / (maxVal - minVal));
          matchedHex = 'rgb(' + Math.round(26 + 112 * ratio) + ',' + Math.round(54 + 126 * ratio) + ',' + Math.round(93 + 155 * ratio) + ')';
        }

        let currentVal = item[metricKey];
        let relativeRatioToRankOne = currentVal / rankOneValue; 
        let pctOfGlobalTotal = globalBaseTotal > 0 ? ((currentVal / globalBaseTotal) * 100).toFixed(1) : '0.0';
        let formattedValue = metricKey === 'qty' ? currentVal.toLocaleString() : '฿' + currentVal.toLocaleString(undefined, {maximumFractionDigits:0});

        let nameFontSize = Math.max(9, Math.round(16 * relativeRatioToRankOne));
        let dataFontSize = Math.max(8, Math.round(12 * relativeRatioToRankOne));
        let lineSpacing = Math.max(10, Math.round(14 * relativeRatioToRankOne));

        let showMetricsRow = (nameFontSize >= 11) || (rankNum <= 10);
        if (rankNum <= 10 && nameFontSize < 11) {
          nameFontSize = 11;
          dataFontSize = 9;
          lineSpacing = 11;
        }

        for (let j = 0; j < rects.length; j++) {
          let width = parseFloat(rects[j].getAttribute('width'));
          let height = parseFloat(rects[j].getAttribute('height'));
          let x = parseFloat(rects[j].getAttribute('x'));
          let y = parseFloat(rects[j].getAttribute('y'));

          if (width > 0 && height > 0 && x >= 0 && y >= 0 && width < element.offsetWidth) {
            if (!rects[j].hasAttribute('data-custom-rendered')) {
              rects[j].setAttribute('fill', matchedHex);
              rects[j].setAttribute('data-custom-rendered', 'true');
              rects[j].setAttribute('stroke', '#363636');      
              rects[j].setAttribute('stroke-width', '1.2');     

              let fontColor = '#ffffff';
              let checkColor = viewKey === 'MEMBER' ? item.Color : item[dimField];
              if ((viewKey === 'MEMBER' || viewKey === 'COLOR') && (checkColor === 'White' || checkColor === 'Yellow')) fontColor = '#121212';

              let svgNS = "http://www.w3.org/2000/svg";
              let textGroup = document.createElementNS(svgNS, "text");
              textGroup.setAttribute("x", (x + width / 2));
              textGroup.setAttribute("y", (y + height / 2 - (showMetricsRow ? 2 : -4)));
              textGroup.setAttribute("text-anchor", "middle");
              textGroup.setAttribute("fill", fontColor);
              textGroup.setAttribute("style", "font-family: sans-serif; font-weight: bold; pointer-events: none;");

              let tspanLine1 = document.createElementNS(svgNS, "tspan");
              tspanLine1.textContent = "#" + rankNum + " " + rawLabel;
              tspanLine1.setAttribute("x", (x + width / 2));
              tspanLine1.setAttribute("style", "font-size: " + nameFontSize + "px;");
              textGroup.appendChild(tspanLine1);

              if (showMetricsRow) {
                let tspanData = document.createElementNS(svgNS, "tspan");
                tspanData.textContent = formattedValue + " (" + pctOfGlobalTotal + "%)";
                tspanData.setAttribute("x", (x + width / 2));
                tspanData.setAttribute("dy", lineSpacing);
                tspanData.setAttribute("style", "font-size: " + dataFontSize + "px; font-weight: normal; opacity: 0.9;");
                textGroup.appendChild(tspanData);
              }

              rects[j].parentNode.appendChild(textGroup);
              break;
            }
          }
        }
      });
    });

    treeMapChart.draw(dataTable, options);
  }

  function drawTimelineChart() {
    let activeTabId = document.querySelector('.tab-content.active').id;
    let targetContainerId = "";
    
    let allowedCheckboxesId = 'timeline_member_checkboxes';
    let dataFieldMatch = 'Member';

    if (activeTabId === 'member_view_tab') {
      targetContainerId = 'member_timeline_chart_div';
      allowedCheckboxesId = 'timeline_member_checkboxes';
      dataFieldMatch = 'Member';
    } else if (activeTabId === 'group_view_tab') {
      targetContainerId = 'group_timeline_chart_div';
      allowedCheckboxesId = 'timeline_group_checkboxes';
      dataFieldMatch = 'Group';
    } else if (activeTabId === 'color_view_tab') {
      targetContainerId = 'color_timeline_chart_div';
      allowedCheckboxesId = 'timeline_color_checkboxes';
      dataFieldMatch = 'Color';
    } else {
      return; // Break early if layout defaults to Events tab view matrix
    }

    const container = document.getElementById(targetContainerId);
    if (!container) return;

    if (FILTERED_DATA.length === 0) { container.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No active records pass filters.</div>"; return; }

    const activeAllowedFilterSet = getSelectedTimelineCheckboxes(allowedCheckboxesId);

    let timeIntervals = new Set(), entityVolumeMap = {}, rollupDataMap = {};

    FILTERED_DATA.forEach(row => {
      if (!row['Date']) return;
      if (row[dataFieldMatch] && activeAllowedFilterSet.size > 0 && !activeAllowedFilterSet.has(row[dataFieldMatch])) return;

      let dateObj = new Date(row['Date']);
      if (isNaN(dateObj.getTime())) return;

      let intervalStr = TIMELINE_GRANULARITY === 'DAILY' ? dateObj.toISOString().split('T')[0] : 
                        (TIMELINE_GRANULARITY === 'MONTHLY' ? dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') : String(dateObj.getFullYear()));

      timeIntervals.add(intervalStr);
      
      let entityKey = 'Total';
      if (TIMELINE_BREAKDOWN === 'CONTEXT') {
        entityKey = row[dataFieldMatch] || 'Unknown';
      }
      
      let qtyVal = Number(row['Quantity']) || Number(row['Qty']) || 0;
      entityVolumeMap[entityKey] = (entityVolumeMap[entityKey] || 0) + qtyVal;

      if (!rollupDataMap[intervalStr]) rollupDataMap[intervalStr] = {};
      rollupDataMap[intervalStr][entityKey] = (rollupDataMap[intervalStr][entityKey] || 0) + qtyVal;
    });

    let sortedIntervals = Array.from(timeIntervals).sort();
    
    let sortedSeriesKeys = Object.keys(entityVolumeMap).sort((a, b) => {
      if (a === 'Total') return -1;
      if (b === 'Total') return 1;
      return entityVolumeMap[b] - entityVolumeMap[a];
    });

    if (sortedIntervals.length === 0) { container.innerHTML = "<div style='padding:20px; text-align:center; color:#aaaaaa;'>No timeline matches under active selection.</div>"; return; }

    let chartHeaders = ['Timeline Segment Interval'];
    sortedSeriesKeys.forEach(k => { chartHeaders.push(k); });
    let chartArray = [chartHeaders];

    if (TIMELINE_CALC_MODE === 'CUMULATIVE') {
      let ongoingSum = {}; sortedSeriesKeys.forEach(k => { ongoingSum[k] = 0; });
      sortedIntervals.forEach(interval => {
        let rowLine = [interval];
        sortedSeriesKeys.forEach(key => { ongoingSum[key] += (rollupDataMap[interval][key] || 0); rowLine.push(ongoingSum[key]); });
        chartArray.push(rowLine);
      });
    } else {
      sortedIntervals.forEach(interval => {
        let rowLine = [interval];
        sortedSeriesKeys.forEach(key => { rowLine.push(rollupDataMap[interval][key] || 0); });
        chartArray.push(rowLine);
      });
    }

    let chartDataTable = google.visualization.arrayToDataTable(chartArray);
    let timelineChart = new google.visualization.LineChart(container);
    
    let seriesColors = [];
    if (TIMELINE_BREAKDOWN === 'CONTEXT') {
      if (dataFieldMatch === 'Member') {
        seriesColors = sortedSeriesKeys.map(m => getMemberColorCode(m));
      } else if (dataFieldMatch === 'Color') {
        seriesColors = sortedSeriesKeys.map(c => (COLOR_MAP[String(c).trim()] || {primary: '#8ab4f8'}).primary);
      } else {
        seriesColors = ['#8ab4f8', '#03dac6', '#ffb74d', '#bb86fc', '#e67e22', '#ff4081', '#aaaaaa', '#27ae60'];
      }
    } else {
      seriesColors = ['#8ab4f8'];
    }

    timelineChart.draw(chartDataTable, {
      backgroundColor: '#1e1e1e',
      title: '(' + TIMELINE_GRANULARITY + " - " + (TIMELINE_CALC_MODE === 'CUMULATIVE' ? 'Cumulative Sum' : 'Interval Mode') + (TIMELINE_BREAKDOWN !== 'NONE' ? ' Breakdown by ' + dataFieldMatch : '') + ')',
      titleTextStyle: { color: '#aaaaaa', fontSize: 12 },
      hAxis: { textStyle: { fontSize: 11, color: '#aaaaaa' }, slantedText: true, slantedTextAngle: 30, gridlines: { count: 0 }, baselineColor: '#444444' },
      vAxis: { title: 'Quantity Metric Sum', titleTextStyle: { color: '#aaaaaa' }, textStyle: { color: '#aaaaaa' }, minValue: 0, gridlines: { count: 0 }, baselineColor: '#444444' },
      colors: seriesColors,
      chartArea: { width: '80%', height: '70%' },
      legend: { position: TIMELINE_BREAKDOWN === 'NONE' ? 'none' : 'right', textStyle: { fontSize: 11, color: '#e0e0e0' } },
      lineWidth: 3,
      animation: { startup: true, duration: 400, easing: 'out' }
    });
  }

      typeSelect.innerHTML = uniqueTypes.map(t => '<option value="' + t + '">' + t + '</option>').join('');
      typeSelect.value = "Cheki";
    }

    // Locations dropdown
    const locationSelect = document.getElementById('form_location');
    if (locationSelect) {

      if (METADATA.locations && METADATA.locations.length > 0) {
        locations = METADATA.locations.map(l => l.Location || l.location || l.LocationName).filter(Boolean);
      } else {
        // Fallback: extract unique locations from historical data
        locations = [...new Set(ALL_DATA.map(d => d.Location).filter(Boolean))];
      }
      if (!locations.includes("Bangkok")) locations.push("Bangkok");
      locations.sort();
      locationSelect.innerHTML = locations.map(l => '<option value="' + l + '">' + l + '</option>').join('');
      locationSelect.value = "Bangkok";
    }
  }

  function lookupMemberMetadata(memberName, dateStr) {
    if (!memberName || !dateStr || !METADATA.members) return null;
    
    const matches = METADATA.members.filter(m => m.member_name === memberName);
    if (matches.length === 0) return null;
    
    // Match row where start_date <= dateStr <= end_date
    const activeMatch = matches.find(m => {
      const start = m.start_date || "1001-01-01";
      const end = m.end_date || "9999-12-31";
      return dateStr >= start && dateStr <= end;
    });
    
    return activeMatch || matches[0];
  }

  function updateFormPreview() {
    const member = document.getElementById('form_member').value;
    const date = document.getElementById('form_date').value;
    const type = document.getElementById('form_type').value;
    const qty = parseInt(document.getElementById('form_quantity').value) || 1;
    
    const previewColor = document.getElementById('preview_color');
    const previewGroup = document.getElementById('preview_group');
    const previewNationality = document.getElementById('preview_nationality');
    const previewCompany = document.getElementById('preview_company');
    const previewPrice = document.getElementById('preview_price');
    
    if (!previewColor) return; // Form not rendered yet
    
    if (!member || !date) {
      previewColor.innerText = "-";
      previewColor.style.color = "";
      previewGroup.innerText = "-";
      previewNationality.innerText = "-";
      previewCompany.innerText = "-";
      previewPrice.innerText = "฿ 0";
      return;
    }
    
    const meta = lookupMemberMetadata(member, date);
    if (meta) {
      const colorVal = meta.color || "N/A";
      previewColor.innerText = colorVal;
      previewColor.setAttribute("style", getTextColorStyle(colorVal));
      previewGroup.innerText = meta.group || "N/A";
      previewNationality.innerText = meta.country || "N/A";
      previewCompany.innerText = meta.company || "N/A";
      
      // Calculate Total Price
      const nationality = meta.country || "";
      let basePrice = 300;
      if (type === "Free Cheki" || type === "Free Shame") {
        basePrice = 0;
      } else if (nationality.includes("KR")) {
        basePrice = 220;
      } else if (type === "Deco Cheki") {
        basePrice = 500;
      }
      const totalPrice = qty * basePrice;
      previewPrice.innerText = "฿ " + totalPrice.toLocaleString();
    } else {
      previewColor.innerText = "-";
      previewColor.style.color = "";
      previewGroup.innerText = "-";
      previewNationality.innerText = "-";
      previewCompany.innerText = "-";
      previewPrice.innerText = "฿ 0";
    }
  }

  function submitTransaction(event) {
    if (event) event.preventDefault();
    
    const saveBtn = document.getElementById('submit_btn');
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerText = "Saving...";
    }
    
    showLoading("Saving Transaction...");
    
    const rowIndex = document.getElementById('form_row_index').value;
    const rowData = {
      'Member': document.getElementById('form_member').value,
      'Date': document.getElementById('form_date').value,
      'Type': document.getElementById('form_type').value,
      'Location': document.getElementById('form_location').value,
      'Quantity': parseInt(document.getElementById('form_quantity').value) || 1,
      'Event': document.getElementById('form_event').value.trim(),
      'Description': document.getElementById('form_description').value.trim(),
      'IMG': document.getElementById('form_img').value.trim(),
      'Talk Topic': document.getElementById('form_talk_topic').value.trim()
    };
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeModal();
          
          // Background admin log call
          var logActionType = rowIndex ? "EDIT_TRANSACTION" : "ADD_TRANSACTION";
          var logActionDetail = rowIndex ?
            ("Updated transaction at row " + rowIndex + ": Member=" + rowData.Member + ", Date=" + rowData.Date + ", Qty=" + rowData.Quantity) :
            ("Added transaction: Member=" + rowData.Member + ", Date=" + rowData.Date + ", Qty=" + rowData.Quantity);
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog(logActionType, logActionDetail);
          
          var newRow = response.row;
          if (rowIndex) {
            // Edit mode: find and replace in ALL_DATA
            var targetIdx = ALL_DATA.findIndex(function(r) { return r._rowIndex === newRow._rowIndex; });
            if (targetIdx !== -1) {
              ALL_DATA[targetIdx] = newRow;
            }
          } else {
            // Add mode: increment _rowIndex of all existing rows first
            ALL_DATA.forEach(function(r) {
              r._rowIndex++;
            });
            // Prepend new row
            ALL_DATA.unshift(newRow);
          }
          
          applyFilters();
          hideLoading();
          
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Transaction";
          }
        } else {
          alert("Error saving: " + response.error);
          hideLoading();
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Transaction";
          }
        }
      })
      .withFailureHandler(function(err) {
        alert("Connection failure: " + err.message);
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerText = "Save Transaction";
        }
      })
      .saveTransaction(rowData, rowIndex ? parseInt(rowIndex) : null);
  }

  function deleteTransaction() {
    const rowIndex = document.getElementById('form_row_index').value;
    if (!rowIndex) return;
    
    if (!confirm("Are you sure you want to delete this transaction from Google Sheets?")) return;
    
    const deleteBtn = document.getElementById('delete_btn');
    const saveBtn = document.getElementById('submit_btn');
    if (deleteBtn) {
      deleteBtn.disabled = true;
      deleteBtn.innerText = "Deleting...";
    }
    if (saveBtn) saveBtn.disabled = true;
    
    showLoading("Deleting Transaction...");
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeModal();
          
          var deletedRowIndex = parseInt(rowIndex);
          var deletedRowData = ALL_DATA.find(function(r) { return r._rowIndex === deletedRowIndex; });
          var memberVal = deletedRowData ? deletedRowData.Member : "";
          var dateVal = deletedRowData ? (deletedRowData.Date || "") : "";
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog("DELETE_TRANSACTION", "Deleted transaction: Member=" + memberVal + ", Date=" + dateVal);
          
          // Remove the deleted row from ALL_DATA
          ALL_DATA = ALL_DATA.filter(function(r) { return r._rowIndex !== deletedRowIndex; });
          
          // Adjust _rowIndex of all rows shifted up
          ALL_DATA.forEach(function(r) {
            if (r._rowIndex > deletedRowIndex) {
              r._rowIndex--;
            }
          });
          
          applyFilters();
          hideLoading();
          
          if (deleteBtn) {
            deleteBtn.disabled = false;
            deleteBtn.innerText = "Delete";
          }
          if (saveBtn) saveBtn.disabled = false;
        } else {
          alert("Error deleting: " + response.error);
          hideLoading();
          if (deleteBtn) {
            deleteBtn.disabled = false;
            deleteBtn.innerText = "Delete";
          }
          if (saveBtn) saveBtn.disabled = false;
        }
      })
      .withFailureHandler(function(err) {
        alert("Connection failure: " + err.message);
        if (deleteBtn) {
          deleteBtn.disabled = false;
          deleteBtn.innerText = "Delete";
        }
        if (saveBtn) saveBtn.disabled = false;
      })
      .deleteTransactionRow(parseInt(rowIndex));
  }

          (m.group && m.group.toLowerCase().includes(memberSearch)) ||
          (m.color && m.color.toLowerCase().includes(memberSearch)) ||
          (m.country && m.country.toLowerCase().includes(memberSearch)) ||
          (m.company && m.company.toLowerCase().includes(memberSearch))
        );
      }
      
      memberBody.innerHTML = filteredMembers.map(m => {
        const isActiveText = m.is_active === true || m.is_active === 'TRUE' || m.is_active === 'true' ? '🟢 Yes' : '🔴 No';
        
        return '<tr>' +
          '<td><button class="edit-row-btn" onclick="openEditMemberModal(' + m._rowIndex + ')">Edit</button></td>' +
          '<td>' + (m.member_name || '-') + '</td>' +
          '<td>' + (m.group || '-') + '</td>' +
          '<td><span style="' + getTextColorStyle(m.color) + '">' + (m.color || '-') + '</span></td>' +
          '<td>' + (m.country || '-') + '</td>' +
          '<td>' + (m.company || '-') + '</td>' +
          '<td>' + (m.start_date || '-') + '</td>' +
          '<td>' + (m.end_date || '-') + '</td>' +
          '<td>' + isActiveText + '</td>' +
        '</tr>';
      }).join('');
    }

    // 2. Render Groups Table
    const groupBody = document.getElementById('metadata_group_body');
    if (groupBody) {
      let filteredGroups = METADATA.groups;
      if (groupSearch) {
        filteredGroups = filteredGroups.filter(g => 
          (g.group && g.group.toLowerCase().includes(groupSearch)) ||
          (g.company && g.company.toLowerCase().includes(groupSearch)) ||

        );

      groupBody.innerHTML = filteredGroups.map(g => {
        return '<tr>' +
          '<td><button class="edit-row-btn" onclick="openEditGroupModal(' + g._rowIndex + ')">Edit</button></td>' +
          '<td>' + (g.group || '-') + '</td>' +
          '<td>' + (g.country || '-') + '</td>' +
          '<td>' + (g.company || '-') + '</td>' +
        '</tr>';
      }).join('');

  function toggleMetadataView(context) {
    if (!context) context = 'raw';
    
    const wrapper = document.getElementById('inline_metadata_wrapper');
    const isCurrentlyOpen = wrapper && wrapper.style.display === 'block' && wrapper.parentNode.id.startsWith(context);
    
    // First, close everything to get a clean state
    closeAllMetadataViews();
    
    if (!isCurrentlyOpen) {
      // Open metadata view in the requested context
      let contentWrapper, placeholder, toggleBtn, backText;
      
      if (context === 'raw') {
        contentWrapper = document.getElementById('raw_table_wrapper');
        placeholder = document.getElementById('raw_metadata_placeholder');
        toggleBtn = document.getElementById('toggle_metadata_btn');
        backText = 'Back to Transactions';
        
        // Hide transaction controls on raw tab
        const transactionControls = document.getElementById('transaction_controls');
        if (transactionControls) transactionControls.style.display = 'none';
      } else if (context === 'member') {
        contentWrapper = document.getElementById('member_content_wrapper');
        placeholder = document.getElementById('member_metadata_placeholder');
        toggleBtn = document.getElementById('toggle_metadata_btn_member');
        backText = 'Back to Member View';
        
        // Hide Member tab graph toggle buttons
        const memberToggle = document.getElementById('member_graph_toggle_wrapper');
        if (memberToggle) memberToggle.style.display = 'none';
      } else if (context === 'group') {
        contentWrapper = document.getElementById('group_content_wrapper');
        placeholder = document.getElementById('group_metadata_placeholder');
        toggleBtn = document.getElementById('toggle_metadata_btn_group');
        backText = 'Back to Group View';
        
        // Hide Group tab graph toggle buttons
        const groupToggle = document.getElementById('group_graph_toggle_wrapper');
        if (groupToggle) groupToggle.style.display = 'none';
      }
      
      if (contentWrapper) contentWrapper.style.display = 'none';
      if (placeholder && wrapper) {
        placeholder.appendChild(wrapper);
        wrapper.style.display = 'block';
      }
      if (toggleBtn) {
        toggleBtn.innerText = backText;
        toggleBtn.classList.add('active');
      }
      
      renderMetadataTables();
    }
  }

  function deleteMember() {
    const rowIndexVal = document.getElementById('member_form_row_index').value;
    if (!rowIndexVal) return;
    
    const name = document.getElementById('member_form_name').value;
    if (!confirm('Are you sure you want to delete member "' + name + '"?')) return;
    
    const deleteBtn = document.getElementById('member_delete_btn');
    if (deleteBtn) deleteBtn.disabled = true;
    
    showLoading('Deleting Member...');
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeMemberModal();
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog("DELETE_MEMBER", "Deleted member: Name=" + name);
          
          var deletedRowIndex = parseInt(rowIndexVal);
          // Remove from METADATA.members
          METADATA.members = METADATA.members.filter(function(m) { return m._rowIndex !== deletedRowIndex; });
          
          // Adjust _rowIndex of all members shifted up
          METADATA.members.forEach(function(m) {
            if (m._rowIndex > deletedRowIndex) {
              m._rowIndex--;
            }
          });
          
          renderMetadataTables();
          hideLoading();
          
          if (deleteBtn) deleteBtn.disabled = false;
        } else {
          alert('Error deleting: ' + response.error);
          hideLoading();
          if (deleteBtn) deleteBtn.disabled = false;
        }
      })
      .withFailureHandler(function(err) {
        alert('Connection failure: ' + err.message);
        hideLoading();
        if (deleteBtn) deleteBtn.disabled = false;
      })
      .deleteMemberMetadata(parseInt(rowIndexVal));
  }

  function deleteGroup() {
    const rowIndexVal = document.getElementById('group_form_row_index').value;
    if (!rowIndexVal) return;
    
    const name = document.getElementById('group_form_name').value;
    if (!confirm('Are you sure you want to delete group "' + name + '"? Any members in this group will have their group set to "N/A".')) return;
    
    const deleteBtn = document.getElementById('group_delete_btn');
    if (deleteBtn) deleteBtn.disabled = true;
    
    showLoading('Deleting Group...');
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeGroupModal();
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog("DELETE_GROUP", "Deleted group: Name=" + name);
          
          var deletedRowIndex = parseInt(rowIndexVal);
          
          // Find deleted group name
          var deletedGroup = METADATA.groups.find(function(g) { return g._rowIndex === deletedRowIndex; });
          var deletedGroupName = deletedGroup ? deletedGroup.group : "";
          
          // Remove from METADATA.groups
          METADATA.groups = METADATA.groups.filter(function(g) { return g._rowIndex !== deletedRowIndex; });
          
          // Adjust _rowIndex of all groups shifted up
          METADATA.groups.forEach(function(g) {
            if (g._rowIndex > deletedRowIndex) {
              g._rowIndex--;
            }
          });
          
          // Update members to group "N/A" client-side
          if (deletedGroupName && METADATA.members) {
            METADATA.members.forEach(function(m) {
              if (m.group && m.group.toLowerCase() === deletedGroupName.toLowerCase()) {
                m.group = "N/A";
              }
            });
          }
          
          renderMetadataTables();
          hideLoading();
          
          if (deleteBtn) deleteBtn.disabled = false;
        } else {
          alert('Error deleting: ' + response.error);
          hideLoading();
          if (deleteBtn) deleteBtn.disabled = false;
        }
      })
      .withFailureHandler(function(err) {
        alert('Connection failure: ' + err.message);
        hideLoading();
        if (deleteBtn) deleteBtn.disabled = false;
      })
      .deleteGroupMetadata(parseInt(rowIndexVal));
  }

  // ==========================================
  // METADATA TAB FORM SUBMISSIONS
  // ==========================================
  function submitMemberForm(event) {
    if (event) event.preventDefault();
    
    const name = document.getElementById('member_form_name').value.trim();
    const image = document.getElementById('member_form_image').value.trim();
    const color = document.getElementById('member_form_color').value;
    const group = document.getElementById('member_form_group').value;
    const start_date = document.getElementById('member_form_start_date').value;
    const end_date = document.getElementById('member_form_end_date').value;
    const is_active = document.getElementById('member_form_active').checked ? 'TRUE' : 'FALSE';

    const saveBtn = document.getElementById('member_submit_btn');
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerText = 'Saving...';
    }

    showLoading('Saving Member...');

    const memberData = {
      member_name: name,
      member_image: image || 'None',
      color: color,
      group: group === 'ADD_NEW_GROUP' ? document.getElementById('member_inline_group_name').value.trim() : group,
      start_date: start_date,
      end_date: end_date,
      is_active: is_active
    };

    if (group === 'ADD_NEW_GROUP') {
      const companyVal = document.getElementById('member_inline_group_company').value;
      const finalCompany = companyVal === 'ADD_NEW_COMPANY' ? 
        document.getElementById('member_inline_company_name').value.trim() : companyVal;
        
      memberData.new_group_details = {
        group: memberData.group,
        country: document.getElementById('member_inline_group_country').value,
        company: finalCompany
      };
    }

    const rowIndexVal = document.getElementById('member_form_row_index').value;
    const isEditMode = rowIndexVal !== '';

    const runner = google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeMemberModal();
          
          // Background admin log call
          var logActionType = isEditMode ? "EDIT_MEMBER" : "ADD_MEMBER";
          var logActionDetail = isEditMode ?
            ("Updated member at row " + rowIndexVal + ": Name=" + memberData.member_name + ", Group=" + memberData.group) :
            ("Added member: Name=" + memberData.member_name + ", Group=" + memberData.group);
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog(logActionType, logActionDetail);
          
          var newMember = response.member;
          if (isEditMode) {
            var idx = METADATA.members.findIndex(function(m) { return m._rowIndex === newMember._rowIndex; });
            if (idx !== -1) {
              METADATA.members[idx] = newMember;
            }
          } else {
            METADATA.members.forEach(function(m) {
              m._rowIndex++;
            });
            METADATA.members.unshift(newMember);
          }
          
          renderMetadataTables();
          hideLoading();
          
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = 'Save Member';
          }
        } else {
          alert('Error saving: ' + response.error);
          hideLoading();
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = 'Save Member';
          }
        }
      })
      .withFailureHandler(function(err) {
        alert('Connection failure: ' + err.message);
        hideLoading();
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerText = 'Save Member';
        }
      });

    if (isEditMode) {
      runner.updateMemberMetadata(parseInt(rowIndexVal), memberData);
    } else {
      runner.addMemberMetadata(memberData);
    }
  }

  function submitGroupForm(event) {
    if (event) event.preventDefault();

    const name = document.getElementById('group_form_name').value.trim();
    const country = document.getElementById('group_form_country').value;
    const companyVal = document.getElementById('group_form_company').value;
    const finalCompany = companyVal === 'ADD_NEW_COMPANY' ? 
      document.getElementById('group_form_new_company').value.trim() : companyVal;

    const saveBtn = document.getElementById('group_submit_btn');
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerText = 'Saving...';
    }

    showLoading('Saving Group...');

    const groupData = {
      group: name,
      country: country,
      company: finalCompany
    };

    const rowIndexVal = document.getElementById('group_form_row_index').value;
    const isEditMode = rowIndexVal !== '';

    const runner = google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          closeGroupModal();
          
          // Background admin log call
          var logActionType = isEditMode ? "EDIT_GROUP" : "ADD_GROUP";
          var logActionDetail = isEditMode ?
            ("Updated group at row " + rowIndexVal + ": Name=" + groupData.group + ", Company=" + groupData.company) :
            ("Added group: Name=" + groupData.group + ", Company=" + groupData.company);
          
          google.script.run
            .withFailureHandler(function(err) {
              console.error("Admin log failed: ", err);
            })
            .writeAdminLog(logActionType, logActionDetail);
          
          var newGroupObj = response.group;
          if (isEditMode) {
            var idx = METADATA.groups.findIndex(function(g) { return g._rowIndex === newGroupObj._rowIndex; });
            if (idx !== -1) {
              var oldGroupName = METADATA.groups[idx].group;
              METADATA.groups[idx] = newGroupObj;
              
              // Cascading update to matching members client-side
              if (oldGroupName && newGroupObj.group && oldGroupName.toLowerCase() !== newGroupObj.group.toLowerCase() && METADATA.members) {
                METADATA.members.forEach(function(m) {
                  if (m.group && m.group.toLowerCase() === oldGroupName.toLowerCase()) {
                    m.group = newGroupObj.group;
                  }
                });
              }
            }
          } else {
            METADATA.groups.forEach(function(g) {
              g._rowIndex++;
            });
            METADATA.groups.unshift(newGroupObj);
          }
          
          renderMetadataTables();
          hideLoading();
          
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = 'Save Group';
          }
        } else {
          alert('Error saving: ' + response.error);
          hideLoading();
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = 'Save Group';
          }
        }
      })
      .withFailureHandler(function(err) {
        alert('Connection failure: ' + err.message);
        hideLoading();
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerText = 'Save Group';
        }
      });

    if (isEditMode) {
      runner.updateGroupMetadata(parseInt(rowIndexVal), groupData);
    } else {
      runner.addGroupMetadata(groupData);
    }
  }
</script>
